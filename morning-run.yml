name: Morning Midas Run

on:
  schedule:
    - cron: "0 13 * * 1-5" # 13:00 UTC weekdays (example)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_API_BASE_URL: https://paper-api.alpaca.markets
      APCA_PAPER: "true"
      ORDER_QTY_SHARES: "10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4 vaderSentiment alpaca-py

      - name: Run bot
        run: python main.py
