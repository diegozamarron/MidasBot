name: Morning Midas Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1-5"

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_API_BASE_URL: https://paper-api.alpaca.markets
      APCA_PAPER: "true"
      ORDER_QTY_SHARES: "10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install cloudscraper beautifulsoup4 vaderSentiment alpaca-py

      - name: Run bot
        run: python main.py

      - name: Commit snapshot if changed
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/latest.json sentiment_tree.pkl
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Update Midas snapshot [skip ci]"
            git push
          } else {
            Write-Host "No snapshot changes to commit."
          }
